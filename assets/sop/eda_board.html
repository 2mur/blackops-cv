<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP: FEATURE EDA DASHBOARD</title>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "recharts": "https://esm.sh/recharts@2.12.2?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #1e2418; color: #a4b596; margin: 0; overflow: hidden; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
        .scanlines { background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.15) 50%, rgba(0, 0, 0, 0.15)); background-size: 100% 4px; pointer-events: none; position: fixed; inset: 0; z-index: 50; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(58, 69, 49, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(164, 181, 150, 0.4); }
        .glow-box { box-shadow: inset 0 0 20px rgba(164, 181, 150, 0.03); background: rgba(20, 24, 16, 0.4); backdrop-filter: blur(4px); }
        
        select { -webkit-appearance: none; appearance: none; background: #141810; border: 1px solid rgba(164, 181, 150, 0.4); color: #a4b596; padding: 4px 8px; font-family: inherit; font-size: 10px; cursor: pointer; outline: none; }
        select:focus { border-color: #facc15; }
    </style>
</head>

<body>
    <div class="scanlines"></div>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            ScatterChart, Scatter, XAxis, YAxis, ZAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine,
            ComposedChart, Area, Line, Legend, BarChart, Bar, Cell
        } from 'recharts';

        const App = () => {
            const [masterData, setMasterData] = useState(null); 
            const [activeDenom, setActiveDenom] = useState('usd');
            const [edaData, setEdaData] = useState(null); 
            
            const [activeTab, setActiveTab] = useState('histograms'); 
            const [activeTarget, setActiveTarget] = useState('');
            const [selectedFeature, setSelectedFeature] = useState('');
            const [selectedCorrFeature, setSelectedCorrFeature] = useState('');
            const [loading, setLoading] = useState(true);
            const [histMode, setHistMode] = useState('stacked');

            // Category Accordion States
            const [expandedScatterCat, setExpandedScatterCat] = useState(null);
            const [expandedHistCat, setExpandedHistCat] = useState(null);
            const [expandedCorrCat, setExpandedCorrCat] = useState(null);

            useEffect(() => {
                fetch('data/eda_features.json')
                    .then(res => res.json())
                    .then(data => {
                        setMasterData(data);
                        const defaultDenom = Object.keys(data)[0] || 'usd';
                        setActiveDenom(defaultDenom);
                        
                        const payload = data[defaultDenom];
                        setEdaData(payload);
                        
                        if (payload) {
                            const defaultTarget = payload.targets && payload.targets.length > 0 ? payload.targets[0] : '';
                            setActiveTarget(defaultTarget); 

                            if (payload.features && payload.features.length > 0) {
                                setSelectedFeature(payload.targets[0] || payload.features[0]); 
                                setSelectedCorrFeature(payload.corr_features ? payload.corr_features[0] : payload.features[0]);
                            }

                            if (payload.feature_categories) {
                                const cats = Object.keys(payload.feature_categories);
                                if (cats.length > 0) {
                                    setExpandedScatterCat(cats[0]);
                                    setExpandedHistCat(cats[0]);
                                    setExpandedCorrCat(cats[0]);
                                }
                            }
                        }
                        setLoading(false);
                    })
                    .catch(err => console.error(err));
            }, []);

            const handleDenomSwitch = (denom) => {
                if (!masterData || !masterData[denom]) return;
                setActiveDenom(denom);
                
                const newPayload = masterData[denom];
                setEdaData(newPayload);
                
                if (newPayload) {
                    const defaultTarget = newPayload.targets && newPayload.targets.length > 0 ? newPayload.targets[0] : '';
                    setActiveTarget(defaultTarget); 

                    if (newPayload.features && newPayload.features.length > 0) {
                        setSelectedFeature(newPayload.targets[0] || newPayload.features[0]); 
                        setSelectedCorrFeature(newPayload.corr_features ? newPayload.corr_features[0] : newPayload.features[0]);
                    }
                }
            };

            const { posScatter, negScatter } = useMemo(() => {
                if (!edaData || !activeTarget || !edaData.scatter_data) return { posScatter: [], negScatter: [] };
                const pos = [];
                const neg = [];
                edaData.scatter_data.forEach(d => {
                    if (d[activeTarget] > 0) pos.push(d);
                    else neg.push(d);
                });
                return { posScatter: pos, negScatter: neg };
            }, [edaData, activeTarget]);

            const featureStats = useMemo(() => {
                if (!edaData || !activeTarget || !edaData.feature_metrics) return [];
                const targetMetrics = edaData.feature_metrics[activeTarget] || {};
                
                return edaData.features.map(f => {
                    const metrics = targetMetrics[f] || {};
                    return { 
                        feature: f, 
                        robust_r2: metrics.robust_r2 || 0,
                        r2: metrics.r2 || 0,
                        mi: metrics.mi || 0,
                        anova_p: metrics.anova_p || 0
                    };
                });
            }, [edaData, activeTarget]);

            // Grouped By Category for Scatter Tab
            const groupedScatterStats = useMemo(() => {
                if (!edaData || !edaData.feature_categories) return {};
                const grouped = {};
                Object.entries(edaData.feature_categories).forEach(([cat, feats]) => {
                    const stats = feats.map(f => featureStats.find(s => s.feature === f)).filter(Boolean);
                    stats.sort((a, b) => b.robust_r2 - a.robust_r2);
                    if (stats.length > 0) grouped[cat] = stats;
                });
                return grouped;
            }, [edaData, featureStats]);

            // Grouped By Category for Histogram Tab
            const groupedHistStats = useMemo(() => {
                if (!edaData || !edaData.feature_categories) return {};
                const grouped = {};
                Object.entries(edaData.feature_categories).forEach(([cat, feats]) => {
                    const stats = feats.map(f => featureStats.find(s => s.feature === f)).filter(Boolean);
                    stats.sort((a, b) => b.anova_p - a.anova_p);
                    if (stats.length > 0) grouped[cat] = stats;
                });
                return grouped;
            }, [edaData, featureStats]);

            // Grouped By Category for Correlation Tab
            const groupedCorrStats = useMemo(() => {
                if (!edaData || !edaData.feature_categories) return {};
                const validCorrFeatures = edaData.corr_features || edaData.features;
                const grouped = {};
                Object.entries(edaData.feature_categories).forEach(([cat, feats]) => {
                    const filtered = feats.filter(f => validCorrFeatures.includes(f));
                    if (filtered.length > 0) grouped[cat] = filtered;
                });
                return grouped;
            }, [edaData]);

            const activeMetrics = useMemo(() => {
                if (!edaData) return null;
                const backendMetrics = edaData.feature_metrics?.[activeTarget]?.[selectedFeature];
                if (backendMetrics && Object.keys(backendMetrics).length > 0) return backendMetrics;

                if (!edaData.scatter_data) return null;
                let posVals = [];
                let negVals = [];

                edaData.scatter_data.forEach(d => {
                    const val = d[selectedFeature];
                    const tVal = d[activeTarget];
                    if (val !== undefined && val !== null && tVal !== undefined && tVal !== null) {
                        if (tVal > 0) posVals.push(val);
                        else negVals.push(val);
                    }
                });

                if (posVals.length === 0 && negVals.length === 0) return null;

                const calc = (arr) => {
                    if (!arr.length) return { m: 0, v: 0 };
                    const m = arr.reduce((a, b) => a + b, 0) / arr.length;
                    const v = arr.reduce((a, b) => a + Math.pow(b - m, 2), 0) / arr.length;
                    return { m, v };
                };

                const pStats = calc(posVals);
                const nStats = calc(negVals);

                return { pos_mean: pStats.m, pos_var: pStats.v, neg_mean: nStats.m, neg_var: nStats.v, anova_p: null, is_jit: true };
            }, [edaData, activeTarget, selectedFeature]);

            const activeHistData = useMemo(() => {
                if (!edaData) return [];
                const backendHist = edaData.hist_data?.[activeTarget]?.[selectedFeature];
                if (backendHist && backendHist.length > 0) return backendHist;

                if (!edaData.scatter_data) return [];

                let min = Infinity, max = -Infinity;
                const validData = [];
                const rawVals = [];
                
                edaData.scatter_data.forEach(d => {
                    if (d[selectedFeature] !== undefined && d[selectedFeature] !== null) {
                        rawVals.push(d[selectedFeature]);
                    }
                });
                
                if (rawVals.length === 0) return [];
                rawVals.sort((a,b) => a-b);
                const trimMin = rawVals[Math.floor(rawVals.length * 0.01)];
                const trimMax = rawVals[Math.floor(rawVals.length * 0.99)];

                edaData.scatter_data.forEach(d => {
                    const val = d[selectedFeature];
                    const tVal = d[activeTarget];
                    if (val !== undefined && val !== null && tVal !== undefined && tVal !== null) {
                        let cVal = val;
                        if (cVal < trimMin) cVal = trimMin;
                        if (cVal > trimMax) cVal = trimMax;
                        
                        if (cVal < min) min = cVal;
                        if (cVal > max) max = cVal;
                        validData.push({ val: cVal, target: tVal });
                    }
                });

                if (validData.length === 0 || min === max) return [];

                const BINS = 30; 
                const step = (max - min) / BINS;
                const bins = Array.from({ length: BINS }, (_, i) => ({
                    range_start: min + i * step,
                    range_end: min + (i + 1) * step,
                    range: `${(min + i * step).toFixed(5)} to ${(min + (i + 1) * step).toFixed(5)}`,
                    pos: 0,
                    neg: 0
                }));

                validData.forEach(d => {
                    let binIdx = Math.floor((d.val - min) / step);
                    if (binIdx >= BINS) binIdx = BINS - 1;
                    if (binIdx < 0) binIdx = 0;
                    if (d.target > 0) bins[binIdx].pos++;
                    else bins[binIdx].neg++;
                });
                return bins;
            }, [edaData, activeTarget, selectedFeature]);

            const pcaStats = useMemo(() => {
                if (!edaData || !activeTarget || !edaData.r2_groups) return [];
                    const groups = edaData.r2_groups[activeTarget] || [];
                return groups.filter(g => {
                    const f1 = g.f1 || "";
                    const f2 = g.f2 || "";
                    const isPca = f1.includes('pca_') && f2.includes('pca_');
                    if (!isPca) return false;
                    const f1IsVel = f1.endsWith('_v');
                    const f2IsVel = f2.endsWith('_v');
                    return f1IsVel === f2IsVel;
                }).sort((a, b) => b.r2 - a.r2);
            }, [edaData, activeTarget]);

            const embeddingStats = useMemo(() => {
                if (!edaData || !activeTarget || !edaData.r2_groups) return [];
                const groups = edaData.r2_groups[activeTarget] || [];
                return groups.filter(g => g.f1 && (g.f1.includes('umap_') || g.f1.includes('phate_')) && g.f1.includes('_x'))
                             .sort((a, b) => b.r2 - a.r2);
            }, [edaData, activeTarget]);

            const corrProfileData = useMemo(() => {
                if (!edaData || !selectedCorrFeature || !edaData.correlation_matrix) return [];
                const row = edaData.correlation_matrix.find(r => r.feature === selectedCorrFeature);
                if (!row) return [];
                return Object.keys(row.correlations)
                    .filter(f => f !== selectedCorrFeature)
                    .map(f => ({ feature: f, val: row.correlations[f], absVal: Math.abs(row.correlations[f]) }))
                    .sort((a, b) => b.absVal - a.absVal)
                    .slice(0, 25)
                    .reverse(); 
            }, [edaData, selectedCorrFeature]);

            const normalizedBins = useMemo(() => {
                if (!edaData || !edaData.bin_timeline) return [];
                return edaData.bin_timeline.map(row => {
                    const total = edaData.bin_features.reduce((sum, f) => sum + (row[f] || 0), 0);
                    const newRow = { time: row.time, price: row.price };
                    edaData.bin_features.forEach(f => {
                        newRow[f] = total > 0 ? (row[f] / total) * 100 : 0;
                    });
                    return newRow;
                });
            }, [edaData]);

            if (loading) return <div className="h-screen flex items-center justify-center text-[#a4b596] animate-pulse">LOADING EDA DATA...</div>;

            const selectedFeatureStat = featureStats.find(s => s.feature === selectedFeature);

            const tbg = '#141810';
            const tbdr = 'rgba(164,181,150,0.5)';
            const tcol = '#d1e0c5';
            const tlcol = '#a4b596';

            return (
                <div className="h-screen flex flex-col bg-[#1e2418] text-[#a4b596] p-4 gap-4 z-10 relative">
                    <header className="flex justify-between items-end border-b border-[#a4b596]/50 pb-2 shrink-0">
                        <div>
                            <h1 className="text-xl font-bold tracking-widest text-[#d1e0c5]">FEATURE EDA ENGINE</h1>
                            
                            <div className="flex items-center gap-4 mt-2">
                                <div className="flex items-center gap-2 border border-[#a4b596]/30 bg-[#141810] p-1">
                                    <button onClick={() => handleDenomSwitch('usd')} className={`px-3 py-1 text-[10px] tracking-widest transition-all ${activeDenom === 'usd' ? 'bg-[#a4b596] text-[#1e2418] font-bold' : 'text-[#a4b596] opacity-60 hover:opacity-100'}`}>USD</button>
                                    <button onClick={() => handleDenomSwitch('native')} className={`px-3 py-1 text-[10px] tracking-widest transition-all ${activeDenom === 'native' ? 'bg-[#a4b596] text-[#1e2418] font-bold' : 'text-[#a4b596] opacity-60 hover:opacity-100'}`}>NATIVE</button>
                                </div>

                                {activeTab !== 'bins' && (
                                    <React.Fragment>
                                        <p className="text-[10px] opacity-70 tracking-widest ml-4">ACTIVE TARGET:</p>
                                        <select className="text-[10px] uppercase" value={activeTarget} onChange={(e) => setActiveTarget(e.target.value)}>
                                            {edaData.targets && edaData.targets.map(t => <option className="text-[10px]" key={t} value={t}>{t.toLowerCase()}</option>)}
                                        </select>
                                    </React.Fragment>
                                )}
                            </div>
                        </div>
                        <div className="flex gap-2 p-1 border border-[#a4b596]/30 bg-[#141810] flex-wrap justify-end max-w-[600px]">
                            <button onClick={() => setActiveTab('scatter')} className={`px-4 py-1 text-xs border tracking-widest transition-all ${activeTab === 'scatter' ? 'bg-[#60a5fa] text-[#1e2418] border-[#60a5fa] font-bold' : 'border-[#60a5fa]/40 text-[#60a5fa] opacity-60 hover:opacity-100'}`}>[FEATURE VS RETURNS]</button>
                            <button onClick={() => setActiveTab('histograms')} className={`px-4 py-1 text-xs border tracking-widest transition-all ${activeTab === 'histograms' ? 'bg-[#3b82f6] text-[#1e2418] border-[#3b82f6] font-bold' : 'border-[#3b82f6]/40 text-[#3b82f6] opacity-60 hover:opacity-100'}`}>[FEATURE HISTOGRAMS]</button>
                            <button onClick={() => setActiveTab('pca')} className={`px-4 py-1 text-xs border tracking-widest transition-all ${activeTab === 'pca' ? 'bg-[#c084fc] text-[#1e2418] border-[#c084fc] font-bold' : 'border-[#c084fc]/40 text-[#c084fc] opacity-60 hover:opacity-100'}`}>[PCA EMBEDDINGS]</button>
                            <button onClick={() => setActiveTab('embeddings')} className={`px-4 py-1 text-xs border tracking-widest transition-all ${activeTab === 'embeddings' ? 'bg-[#a855f7] text-[#1e2418] border-[#a855f7] font-bold' : 'border-[#a855f7]/40 text-[#a855f7] opacity-60 hover:opacity-100'}`}>[PHATE/UMAP]</button>
                            <button onClick={() => setActiveTab('correlation')} className={`px-4 py-1 text-xs border tracking-widest transition-all ${activeTab === 'correlation' ? 'bg-[#10b981] text-[#1e2418] border-[#10b981] font-bold' : 'border-[#10b981]/40 text-[#10b981] opacity-60 hover:opacity-100'}`}>[CORRELATION]</button>
                            <button onClick={() => setActiveTab('bins')} className={`px-4 py-1 text-xs border tracking-widest transition-all ${activeTab === 'bins' ? 'bg-[#facc15] text-[#1e2418] border-[#facc15] font-bold' : 'border-[#facc15]/40 text-[#facc15] opacity-60 hover:opacity-100'}`}>[PNL BINS]</button>
                        </div>
                    </header>

                    {/* TAB: FEATURE VS TARGET (SCATTER) */}
                    {activeTab === 'scatter' && (
                        <div className="flex-1 flex gap-4 min-h-0">
                            <div className="w-[300px] border border-[#a4b596]/30 bg-[#141810] flex flex-col min-h-0 glow-box">
                                <h3 className="text-[10px] font-bold text-[#60a5fa] p-3 border-b border-[#a4b596]/30 tracking-widest bg-[#1a2016]">
                                    FEATURES RANKED BY ROBUST R²
                                </h3>
                                <div className="flex-1 overflow-y-auto p-2">
                                    {Object.entries(groupedScatterStats).map(([category, stats]) => (
                                        <div key={category} className="mb-2">
                                            <div 
                                                className="flex justify-between items-center text-[9px] font-bold text-[#60a5fa] bg-[#1a2016] p-2 cursor-pointer border border-[#a4b596]/20"
                                                onClick={() => setExpandedScatterCat(expandedScatterCat === category ? null : category)}
                                            >
                                                <span>{category.toUpperCase()} ({stats.length})</span>
                                                <span>{expandedScatterCat === category ? '▼' : '▶'}</span>
                                            </div>
                                            {expandedScatterCat === category && (
                                                <div className="flex flex-col border border-t-0 border-[#a4b596]/20 bg-[#141810]/50">
                                                    {stats.map((stat) => {
                                                        const isSelected = stat.feature === selectedFeature;
                                                        return (
                                                            <div key={stat.feature} onClick={() => setSelectedFeature(stat.feature)}
                                                                className={`flex justify-between items-center text-[10px] py-2 px-2 cursor-pointer border-b border-[#a4b596]/10 transition-colors ${isSelected ? 'bg-[#60a5fa]/20 border-l-2 border-l-[#60a5fa]' : 'hover:bg-[#a4b596]/10'}`}
                                                            >
                                                                <span className={isSelected ? 'text-white font-bold truncate pr-2' : 'opacity-80 truncate pr-2'}>{stat.feature}</span>
                                                                <span className={isSelected ? 'text-[#60a5fa] font-bold shrink-0' : 'text-[#a4b596] shrink-0'}>{stat.robust_r2.toFixed(4)}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="flex-1 border border-[#a4b596]/30 bg-[#3a4531]/10 p-4 glow-box flex flex-col relative min-h-0">
                                <div className="absolute top-4 left-4 z-10 flex flex-col gap-1">
                                    <p className="text-[10px] uppercase opacity-70">X-AXIS: {selectedFeature}</p>
                                    <p className="text-[10px] uppercase opacity-70 text-[#60a5fa]">Y-AXIS: {activeTarget}</p>
                                </div>
                                
                                {selectedFeatureStat && (
                                    <div className="absolute top-4 right-4 z-10 flex gap-4 text-right bg-[#141810]/80 p-2 border border-[#a4b596]/20 backdrop-blur-sm">
                                        <div>
                                            <p className="text-[9px] uppercase opacity-70 text-[#60a5fa]">MUTUAL INFO</p>
                                            <p className="text-lg font-bold text-white">{selectedFeatureStat.mi.toFixed(4)}</p>
                                        </div>
                                        <div>
                                            <p className="text-[9px] uppercase opacity-70 text-[#60a5fa]">STD R²</p>
                                            <p className="text-lg font-bold text-white">{selectedFeatureStat.r2.toFixed(4)}</p>
                                        </div>
                                        <div>
                                            <p className="text-[9px] uppercase opacity-70 text-[#60a5fa]">ROBUST R²</p>
                                            <p className="text-lg font-bold text-white">{selectedFeatureStat.robust_r2.toFixed(4)}</p>
                                        </div>
                                    </div>
                                )}
                                
                                <ResponsiveContainer width="100%" height="100%">
                                    <ScatterChart margin={{ top: 50, right: 20, bottom: 20, left: 20 }}>
                                        <CartesianGrid strokeDasharray="3 4" stroke="#a4b596" opacity={0.1} />
                                        <XAxis type="number" dataKey={selectedFeature} name={selectedFeature} tick={{fontSize: 9, fill: '#a4b596'}} axisLine={false} tickLine={false} />
                                        <YAxis type="number" dataKey={activeTarget} name={activeTarget} tick={{fontSize: 9, fill: '#a4b596'}} axisLine={false} tickLine={false} />
                                        <ZAxis type="number" range={[5, 5]} />
                                        <Tooltip cursor={{strokeDasharray: '3 3', opacity: 0.3}} contentStyle={{ backgroundColor: tbg, borderColor: 'rgba(96,165,250,0.5)', color: tcol }} itemStyle={{ color: tcol }} labelStyle={{ color: tlcol }} />
                                        <ReferenceLine y={0} stroke="#a4b596" opacity={0.4} />
                                        <Scatter name="Positive Return" data={posScatter} fill="#10b981" opacity={0.6} shape="circle" />
                                        <Scatter name="Negative Return" data={negScatter} fill="#f87171" opacity={0.6} shape="circle" />
                                    </ScatterChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    )}

                    {/* TAB: HISTOGRAMS */}
                    {activeTab === 'histograms' && (
                        <div className="flex-1 flex gap-4 min-h-0">
                            <div className="w-[300px] flex flex-col gap-4 min-h-0 shrink-0">
                                <div className="border border-[#a4b596]/30 bg-[#141810] flex flex-col glow-box shrink-0 max-h-[40%]">
                                    <h3 className="text-[10px] font-bold text-[#f59e0b] p-3 border-b border-[#a4b596]/30 tracking-widest bg-[#1a2016]">
                                        SELECT RETURN DISTRIBUTION
                                    </h3>
                                    <div className="overflow-y-auto p-2">
                                        {edaData.targets && edaData.targets.map((target) => {
                                            const isSelected = target === selectedFeature;
                                            return (
                                                <div key={`hist-target-${target}`} onClick={() => setSelectedFeature(target)}
                                                    className={`flex justify-between items-center text-[10px] py-2 px-2 cursor-pointer border-b border-[#a4b596]/10 transition-colors ${isSelected ? 'bg-[#f59e0b]/20 border-l-2 border-l-[#f59e0b]' : 'hover:bg-[#a4b596]/10'}`}
                                                >
                                                    <span className={isSelected ? 'text-white font-bold truncate pr-2 uppercase' : 'opacity-80 truncate pr-2 uppercase'}>
                                                        {target.replace(/_/g, ' ')}
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="border border-[#a4b596]/30 bg-[#141810] flex flex-col min-h-0 glow-box flex-1">
                                    <h3 className="text-[10px] font-bold text-[#3b82f6] p-3 border-b border-[#a4b596]/30 tracking-widest bg-[#1a2016]">
                                        SELECT FEATURE TO BIN
                                    </h3>
                                    <div className="flex-1 overflow-y-auto p-2">
                                        {Object.entries(groupedHistStats).map(([category, stats]) => (
                                            <div key={category} className="mb-2">
                                                <div 
                                                    className="flex justify-between items-center text-[9px] font-bold text-[#3b82f6] bg-[#1a2016] p-2 cursor-pointer border border-[#a4b596]/20"
                                                    onClick={() => setExpandedHistCat(expandedHistCat === category ? null : category)}
                                                >
                                                    <span>{category.toUpperCase()} ({stats.length})</span>
                                                    <span>{expandedHistCat === category ? '▼' : '▶'}</span>
                                                </div>
                                                {expandedHistCat === category && (
                                                    <div className="flex flex-col border border-t-0 border-[#a4b596]/20 bg-[#141810]/50">
                                                        {stats.map((stat) => {
                                                            const isSelected = stat.feature === selectedFeature;
                                                            return (
                                                                <div key={`hist-${stat.feature}`} onClick={() => setSelectedFeature(stat.feature)}
                                                                    className={`flex justify-between items-center text-[10px] py-2 px-2 cursor-pointer border-b border-[#a4b596]/10 transition-colors ${isSelected ? 'bg-[#3b82f6]/20 border-l-2 border-l-[#3b82f6]' : 'hover:bg-[#a4b596]/10'}`}
                                                                >
                                                                    <span className={isSelected ? 'text-white font-bold truncate pr-2' : 'opacity-80 truncate pr-2'}>{stat.feature}</span>
                                                                    <span className={isSelected ? 'text-[#3b82f6] font-bold shrink-0' : 'text-[#a4b596] shrink-0'}>{stat.anova_p.toFixed(6)}</span>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex-1 border border-[#a4b596]/30 bg-[#3a4531]/10 p-4 glow-box flex flex-col relative min-h-0">
                                <div className="absolute top-4 left-4 z-10 flex flex-col gap-1">
                                    <div className="flex items-center gap-4">
                                        <p className="text-[10px] uppercase opacity-70">DISTRIBUTION: <span className="text-[#3b82f6] font-bold">{selectedFeature}</span></p>
                                        
                                        <div className="flex border border-[#3b82f6]/30 bg-[#141810] text-[9px]">
                                            <button onClick={() => setHistMode('stacked')} className={`px-2 py-1 ${histMode === 'stacked' ? 'bg-[#3b82f6] text-[#1e2418]' : 'text-[#3b82f6] opacity-60 hover:opacity-100'}`}>STACKED</button>
                                            <button onClick={() => setHistMode('grouped')} className={`px-2 py-1 ${histMode === 'grouped' ? 'bg-[#3b82f6] text-[#1e2418]' : 'text-[#3b82f6] opacity-60 hover:opacity-100'}`}>GROUPED</button>
                                        </div>
                                    </div>
                                    <p className="text-[9px] uppercase opacity-50">TRIMMED 1% OUTLIERS | SPLIT BY {activeTarget}</p>
                                </div>

                                {activeMetrics && (
                                    <div className="absolute top-4 right-4 z-10 flex gap-4 text-right bg-[#141810]/80 p-2 border border-[#a4b596]/20 backdrop-blur-sm">
                                        <div>
                                            <p className="text-[8px] uppercase opacity-70 text-[#10b981]">POS MEAN (TRIM)</p>
                                            <p className="text-xs font-mono text-white">{activeMetrics.pos_mean?.toFixed(6) || 0}</p>
                                            <p className="text-[8px] uppercase opacity-50 mt-1">VAR: {activeMetrics.pos_var?.toExponential(1) || 0}</p>
                                        </div>
                                        <div className="border-l border-[#a4b596]/20 pl-4">
                                            <p className="text-[8px] uppercase opacity-70 text-[#f87171]">NEG MEAN (TRIM)</p>
                                            <p className="text-xs font-mono text-white">{activeMetrics.neg_mean?.toFixed(6) || 0}</p>
                                            <p className="text-[8px] uppercase opacity-50 mt-1">VAR: {activeMetrics.neg_var?.toExponential(1) || 0}</p>
                                        </div>
                                        <div className="border-l border-[#a4b596]/20 pl-4">
                                            <p className="text-[8px] uppercase opacity-70 text-[#3b82f6]">ANOVA P-VAL</p>
                                            <p className={`text-xs font-mono font-bold ${(!activeMetrics.is_jit && activeMetrics.anova_p < 0.05) ? 'text-[#3b82f6]' : 'text-white/50'}`}>
                                                {activeMetrics.is_jit ? 'N/A' : (activeMetrics.anova_p?.toFixed(6) || 0)}
                                            </p>
                                            <p className="text-[8px] uppercase opacity-50 mt-1">
                                                {activeMetrics.is_jit ? 'JIT COMPUTED' : '(KRUSKAL-WALLIS)'}
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {activeHistData.length > 0 ? (
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart 
                                            data={activeHistData} 
                                            margin={{ top: 60, right: 20, bottom: 40, left: 20 }}
                                            barGap={histMode === 'grouped' ? '-100%' : 4}
                                        >
                                            <CartesianGrid strokeDasharray="3 4" stroke="#a4b596" opacity={0.1} vertical={false} />
                                            <XAxis dataKey="range" tick={{fontSize: 9, fill: '#a4b596'}} angle={-45} textAnchor="end" height={60} axisLine={false} tickLine={false} minTickGap={15} />
                                            <YAxis tick={{fontSize: 9, fill: '#a4b596'}} axisLine={false} tickLine={false} />
                                            <Tooltip cursor={{fill: 'rgba(164, 181, 150, 0.05)'}} contentStyle={{ backgroundColor: tbg, borderColor: tbdr, color: tcol }} itemStyle={{ color: tcol }} labelStyle={{ color: tlcol }} />
                                            <Legend wrapperStyle={{ fontSize: '10px', paddingTop: '10px' }} />
                                            <Bar dataKey="pos" name="Positive Return" stackId={histMode === 'stacked' ? "a" : undefined} fill="#10b981" opacity={histMode === 'grouped' ? 0.4 : 1} />
                                            <Bar dataKey="neg" name="Negative Return" stackId={histMode === 'stacked' ? "a" : undefined} fill="#f87171" opacity={histMode === 'grouped' ? 0.4 : 1} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                ) : (
                                    <div className="flex-1 flex items-center justify-center text-red-500 text-xs tracking-widest mt-12">
                                        NO VALID DATA DETECTED FOR DISTRIBUTION
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* TAB: PCA PAIRS */}
                    {activeTab === 'pca' && (
                        <div className="flex-1 flex flex-col min-h-0">
                            {pcaStats.length === 0 ? (
                                <div className="flex-1 border border-[#f87171]/50 bg-[#f87171]/10 flex items-center justify-center flex-col gap-2">
                                    <p className="text-[#f87171] font-bold text-lg tracking-widest">WARNING: NO PCA FEATURES DETECTED</p>
                                </div>
                            ) : (
                                <div className="flex-1 overflow-y-auto pr-2">
                                    <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 pb-4">
                                        {pcaStats.map((stat, idx) => {
                                            const f1 = stat.f1, f2 = stat.f2;
                                            const mappedPos = posScatter.map(d => ({ x: d[f1], y: d[f2] }));
                                            const mappedNeg = negScatter.map(d => ({ x: d[f1], y: d[f2] }));

                                            return (
                                                <div key={idx} className="aspect-square border border-[#c084fc]/30 bg-[#141810] p-2 glow-box flex flex-col relative">
                                                    <div className="absolute top-2 left-2 z-10 flex flex-col gap-1">
                                                        <p className="text-[10px] uppercase opacity-70 tracking-widest text-[#c084fc] font-bold">
                                                            {f2.replace('pca_', '')} vs {f1.replace('pca_', '')}
                                                        </p>
                                                    </div>
                                                    <div className="absolute top-2 right-2 z-10 text-right">
                                                        <p className="text-[9px] uppercase opacity-70 text-[#c084fc]">R² SCORE</p>
                                                        <p className="text-sm font-bold text-white">{stat.r2.toFixed(4)}</p>
                                                    </div>
                                                    <div className="flex-1 mt-6">
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <ScatterChart margin={{ top: 5, right: 5, bottom: -5, left: -25 }}>
                                                                <CartesianGrid strokeDasharray="3 4" stroke="#a4b596" opacity={0.1} />
                                                                <XAxis type="number" dataKey="x" name={f1} tick={{fontSize: 8, fill: '#a4b596'}} axisLine={false} tickLine={false} />
                                                                <YAxis type="number" dataKey="y" name={f2} tick={{fontSize: 8, fill: '#a4b596'}} axisLine={false} tickLine={false} />
                                                                <ZAxis type="number" range={[2, 2]} />
                                                                <Tooltip cursor={{strokeDasharray: '3 3', opacity: 0.3}} contentStyle={{ backgroundColor: tbg, borderColor: 'rgba(192,132,252,0.5)', color: tcol }} itemStyle={{ color: tcol }} labelStyle={{ color: tlcol }} />
                                                                <ReferenceLine y={0} stroke="#c084fc" opacity={0.2} />
                                                                <ReferenceLine x={0} stroke="#c084fc" opacity={0.2} />
                                                                <Scatter name="Positive Return" data={mappedPos} fill="#10b981" opacity={0.7} shape="circle" />
                                                                <Scatter name="Negative Return" data={mappedNeg} fill="#f87171" opacity={0.7} shape="circle" />
                                                            </ScatterChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* TAB: EMBEDDINGS (UMAP / PHATE) */}
                    {activeTab === 'embeddings' && (
                        <div className="flex-1 flex flex-col min-h-0">
                            {embeddingStats.length === 0 ? (
                                <div className="flex-1 border border-[#f87171]/50 bg-[#f87171]/10 flex items-center justify-center flex-col gap-2">
                                    <p className="text-[#f87171] font-bold text-lg tracking-widest">WARNING: NO EMBEDDING FEATURES DETECTED</p>
                                </div>
                            ) : (
                                <div className="flex-1 overflow-y-auto pr-2">
                                    <div className="grid grid-cols-2 gap-4 pb-4 h-full">
                                        {embeddingStats.map((stat, idx) => {
                                            const f1 = stat.f1, f2 = stat.f2; 
                                            const mappedPos = posScatter.map(d => ({ x: d[f1], y: d[f2] }));
                                            const mappedNeg = negScatter.map(d => ({ x: d[f1], y: d[f2] }));
                                            
                                            const title = f1.replace('_x', '').toUpperCase().replace('_', ' ');

                                            return (
                                                <div key={idx} className="border border-[#a855f7]/30 bg-[#141810] p-2 glow-box flex flex-col relative min-h-[400px]">
                                                    <div className="absolute top-4 left-4 z-10 flex flex-col gap-1">
                                                        <p className="text-[12px] uppercase opacity-90 tracking-widest text-[#a855f7] font-bold">
                                                            {title}
                                                        </p>
                                                        <p className="text-[9px] opacity-60">(3D R² shown, 2D Projection)</p>
                                                    </div>
                                                    <div className="absolute top-4 right-4 z-10 text-right">
                                                        <p className="text-[10px] uppercase opacity-70 text-[#a855f7]">3D R² SCORE</p>
                                                        <p className="text-xl font-bold text-white">{stat.r2.toFixed(4)}</p>
                                                    </div>
                                                    <div className="flex-1 mt-10">
                                                        <ResponsiveContainer width="100%" height="100%">
                                                            <ScatterChart margin={{ top: 10, right: 10, bottom: 10, left: -20 }}>
                                                                <CartesianGrid strokeDasharray="3 4" stroke="#a4b596" opacity={0.1} />
                                                                <XAxis type="number" dataKey="x" name="Dimension 1" tick={{fontSize: 9, fill: '#a4b596'}} axisLine={false} tickLine={false} />
                                                                <YAxis type="number" dataKey="y" name="Dimension 2" tick={{fontSize: 9, fill: '#a4b596'}} axisLine={false} tickLine={false} />
                                                                <ZAxis type="number" range={[2, 2]} />
                                                                <Tooltip cursor={{strokeDasharray: '3 3', opacity: 0.3}} contentStyle={{ backgroundColor: tbg, borderColor: 'rgba(168,85,247,0.5)', color: tcol }} itemStyle={{ color: tcol }} labelStyle={{ color: tlcol }} />
                                                                <ReferenceLine y={0} stroke="#a855f7" opacity={0.2} />
                                                                <ReferenceLine x={0} stroke="#a855f7" opacity={0.2} />
                                                                <Scatter name="Positive Return" data={mappedPos} fill="#10b981" opacity={0.6} shape="circle" />
                                                                <Scatter name="Negative Return" data={mappedNeg} fill="#f87171" opacity={0.6} shape="circle" />
                                                            </ScatterChart>
                                                        </ResponsiveContainer>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* TAB: CORRELATION PROFILE */}
                    {activeTab === 'correlation' && (
                        <div className="flex-1 flex gap-4 min-h-0">
                            <div className="w-[300px] border border-[#a4b596]/30 bg-[#141810] flex flex-col min-h-0 glow-box shrink-0">
                                <h3 className="text-[10px] font-bold text-[#10b981] p-3 border-b border-[#a4b596]/30 tracking-widest bg-[#1a2016]">
                                    SELECT FEATURE
                                </h3>
                                <div className="flex-1 overflow-y-auto p-2">
                                    {Object.entries(groupedCorrStats).map(([category, feats]) => (
                                        <div key={category} className="mb-2">
                                            <div 
                                                className="flex justify-between items-center text-[9px] font-bold text-[#10b981] bg-[#1a2016] p-2 cursor-pointer border border-[#a4b596]/20"
                                                onClick={() => setExpandedCorrCat(expandedCorrCat === category ? null : category)}
                                            >
                                                <span>{category.toUpperCase()} ({feats.length})</span>
                                                <span>{expandedCorrCat === category ? '▼' : '▶'}</span>
                                            </div>
                                            {expandedCorrCat === category && (
                                                <div className="flex flex-col border border-t-0 border-[#a4b596]/20 bg-[#141810]/50">
                                                    {feats.map((feature) => {
                                                        const isSelected = feature === selectedCorrFeature;
                                                        return (
                                                            <div key={feature} onClick={() => setSelectedCorrFeature(feature)}
                                                                className={`flex items-center text-[10px] py-2 px-2 cursor-pointer border-b border-[#a4b596]/10 transition-colors ${isSelected ? 'bg-[#10b981]/20 border-l-2 border-l-[#10b981]' : 'hover:bg-[#a4b596]/10'}`}
                                                            >
                                                                <span className={isSelected ? 'text-white font-bold truncate' : 'opacity-80 truncate'}>{feature}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="flex-1 border border-[#a4b596]/30 bg-[#3a4531]/10 p-4 glow-box flex flex-col relative min-h-0">
                                <div className="absolute top-4 left-4 z-10 flex gap-6">
                                    <div>
                                        <p className="text-[10px] uppercase opacity-70">CORRELATION PROFILE FOR</p>
                                        <p className="text-lg font-bold text-[#10b981]">{selectedCorrFeature}</p>
                                    </div>
                                </div>
                                <div className="absolute top-4 right-4 z-10 text-right w-48 border border-[#facc15]/30 bg-[#141810] p-2">
                                    <p className="text-[9px] uppercase text-[#facc15] font-bold border-b border-[#facc15]/30 pb-1 mb-1">REDUNDANT ALERT (&gt;0.85)</p>
                                    <div className="max-h-24 overflow-y-auto">
                                        {edaData.redundant_pairs.filter(p => p.f1 === selectedCorrFeature || p.f2 === selectedCorrFeature).map((p, i) => (
                                            <p key={i} className="text-[9px] text-white">
                                                {p.f1 === selectedCorrFeature ? p.f2 : p.f1} ({p.corr.toFixed(2)})
                                            </p>
                                        ))}
                                        {edaData.redundant_pairs.filter(p => p.f1 === selectedCorrFeature || p.f2 === selectedCorrFeature).length === 0 && (
                                            <p className="text-[9px] opacity-50">No severe redundancies.</p>
                                        )}
                                    </div>
                                </div>
                                <div className="flex-1 mt-12">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={corrProfileData} layout="vertical" margin={{ top: 10, right: 30, left: 60, bottom: 10 }}>
                                            <CartesianGrid strokeDasharray="3 4" stroke="#a4b596" opacity={0.1} horizontal={true} vertical={false}/>
                                            <XAxis type="number" domain={[-1, 1]} tick={{fontSize: 8, fill: '#a4b596'}} axisLine={false} tickLine={false} />
                                            <YAxis dataKey="feature" type="category" tick={{fontSize: 8, fill: '#a4b596'}} axisLine={false} tickLine={false} width={100} />
                                            <Tooltip cursor={{fill: 'rgba(164, 181, 150, 0.05)'}} contentStyle={{ backgroundColor: tbg, borderColor: tbdr, color: tcol }} itemStyle={{ color: tcol }} labelStyle={{ color: tlcol }} />
                                            <ReferenceLine x={0} stroke="#a4b596" opacity={0.4} />
                                            <Bar dataKey="val" isAnimationActive={false}>
                                                {corrProfileData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={entry.val > 0 ? '#10b981' : '#f87171'} opacity={0.8} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TAB: PNL BINS */}
                    {activeTab === 'bins' && (
                        <div className="flex-1 border border-[#facc15]/30 bg-[#141810] p-4 relative glow-box flex flex-col min-h-0">
                            <div className="absolute top-4 left-4 z-10">
                                <p className="text-[10px] uppercase tracking-wider opacity-70">100% STACKED PNL BIN MIGRATION vs PRICE</p>
                            </div>
                            
                            {edaData.bin_timeline && edaData.bin_timeline.length > 0 ? (
                                <ResponsiveContainer width="100%" height="100%">
                                    <ComposedChart data={normalizedBins} margin={{ top: 30, right: 10, left: -20, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 4" stroke="#a4b596" opacity={0.1} vertical={false} />
                                        <XAxis dataKey="time" tick={{fontSize: 9, fill: '#a4b596'}} axisLine={false} tickLine={false} minTickGap={50} />
                                        <YAxis yAxisId="left" domain={[0, 100]} tick={{fontSize: 9, fill: '#a4b596'}} axisLine={false} tickLine={false} tickFormatter={(val) => `${val}%`} />
                                        <YAxis yAxisId="right" orientation="right" domain={['auto', 'auto']} tick={{fontSize: 9, fill: '#facc15'}} axisLine={false} tickLine={false} />
                                        <Tooltip 
                                            contentStyle={{ backgroundColor: tbg, borderColor: 'rgba(250,204,21,0.5)', color: tcol, fontSize: '10px' }}
                                            itemStyle={{ color: tcol }}
                                            labelStyle={{ color: tlcol }}
                                            formatter={(val, name) => [name === 'price' ? `$${val.toFixed(4)}` : `${val.toFixed(1)}%`, name]}
                                        />
                                        
                                        {edaData.bin_features.map((f, i) => {
                                            const isNegative = f.includes('-') || f.includes('<');
                                            const opacity = 0.2 + (i / edaData.bin_features.length) * 0.7;
                                            const fill = isNegative ? `rgba(248, 113, 113, ${opacity})` : `rgba(16, 185, 129, ${opacity})`;
                                            
                                            return (
                                                <Area 
                                                    key={f} 
                                                    yAxisId="left"
                                                    type="monotone" 
                                                    dataKey={f} 
                                                    stackId="1" 
                                                    stroke={fill} 
                                                    fill={fill} 
                                                    isAnimationActive={false}
                                                />
                                            );
                                        })}
                                        
                                        <Line yAxisId="right" type="monotone" dataKey="price" stroke="#facc15" strokeWidth={2} dot={false} isAnimationActive={false} />
                                    </ComposedChart>
                                </ResponsiveContainer>
                            ) : (
                                <div className="flex-1 flex items-center justify-center text-red-500 text-xs tracking-widest">
                                    NO BIN TIMELINE DATA FOUND
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
