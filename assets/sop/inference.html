<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP ML EVALUATION TERMINAL</title>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "recharts": "https://esm.sh/recharts@2.12.2?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { 
            background-color: #1e2418; color: #a4b596; margin: 0; overflow: hidden; 
            text-shadow: 0 0 2px rgba(164, 181, 150, 0.4); 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
        }
        .scanlines { 
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.15) 50%, rgba(0, 0, 0, 0.15)); 
            background-size: 100% 4px; pointer-events: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; 
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(58, 69, 49, 0.2); border-left: 1px solid rgba(164, 181, 150, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(164, 181, 150, 0.4); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(164, 181, 150, 0.6); }
        .crt-flicker { animation: flicker 0.15s infinite; }
        @keyframes flicker { 0% { opacity: 0.95; } 50% { opacity: 1; } 100% { opacity: 0.98; } }
        .blinking-cursor::after { content: '_'; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .glow-box { box-shadow: inset 0 0 20px rgba(164, 181, 150, 0.03); background: rgba(20, 24, 16, 0.4); backdrop-filter: blur(4px); }
        .metric-bar-bg { background: rgba(30, 36, 24, 0.8); border: 1px solid rgba(164, 181, 150, 0.2); }
    </style>
</head>

<body>
    <div class="scanlines"></div>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { LineChart, Line, XAxis, YAxis, CartesianGrid, ResponsiveContainer, Tooltip as RechartsTooltip } from 'recharts';

        const REF_GREEN = '#82ba97';
        const REF_RED = '#d17373';
        const REF_GOLD = '#b8a86c';
        const REF_BLUE = '#7ba6d1';
        const REF_PURPLE = '#8c74a3';

        const ToggleButton = ({ label, active, onClick, color }) => (
            <button onClick={onClick} style={{ borderColor: color, backgroundColor: active ? color : 'transparent', color: active ? '#1e2418' : color }} className="px-2 py-0.5 text-[9px] border font-bold transition-colors uppercase tracking-widest mr-2 mb-1 cursor-pointer">
                {label}
            </button>
        );

        const MetricBar = ({ label, value, color }) => (
            <div className="mb-2">
                <div className="flex justify-between text-[10px] mb-1 opacity-80">
                    <span>{label}</span>
                    <span style={{color: color}} className="font-bold">{value.toFixed(2)}%</span>
                </div>
                <div className="w-full h-1.5 metric-bar-bg overflow-hidden">
                    <div style={{ width: `${value}%`, backgroundColor: color }} className="h-full"></div>
                </div>
            </div>
        );

        const ConfusionMatrix = ({ cm }) => {
            if (!cm) return <div className="text-[10px] opacity-50 flex-1 flex items-center justify-center">CM DATA MISSING</div>;
            return (
                <div className="flex-1 flex flex-col items-center justify-center py-2">
                    <div className="grid grid-cols-2 gap-1 w-full text-center text-[10px] tracking-widest font-mono">
                        <div className="bg-[#82ba97]/10 border border-[#82ba97]/30 p-2 flex flex-col justify-center">
                            <span className="text-[#82ba97] opacity-70 text-[8px] uppercase">TRUE NEG</span>
                            <span className="text-[#82ba97] font-bold text-lg">{cm.TN}</span>
                        </div>
                        <div className="bg-[#d17373]/10 border border-[#d17373]/30 p-2 flex flex-col justify-center">
                            <span className="text-[#d17373] opacity-70 text-[8px] uppercase">FALSE POS</span>
                            <span className="text-[#d17373] font-bold text-lg">{cm.FP}</span>
                        </div>
                        <div className="bg-[#b8a86c]/10 border border-[#b8a86c]/30 p-2 flex flex-col justify-center">
                            <span className="text-[#b8a86c] opacity-70 text-[8px] uppercase">FALSE NEG</span>
                            <span className="text-[#b8a86c] font-bold text-lg">{cm.FN}</span>
                        </div>
                        <div className="bg-[#7ba6d1]/10 border border-[#7ba6d1]/30 p-2 flex flex-col justify-center">
                            <span className="text-[#7ba6d1] opacity-70 text-[8px] uppercase">TRUE POS</span>
                            <span className="text-[#7ba6d1] font-bold text-lg">{cm.TP}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [metrics, setMetrics] = useState([]);
            const [filterModel, setFilterModel] = useState('ALL');
            const [filterRes, setFilterRes] = useState('ALL');
            const [filterDenom, setFilterDenom] = useState('ALL');
            const [sortBy, setSortBy] = useState('f1');
            const [viewMode, setViewMode] = useState('BARS'); // 'BARS', 'CM', 'ROC'

            useEffect(() => {
                fetch('data/model_metrics.json')
                    .then(res => res.json())
                    .then(data => setMetrics(data))
                    .catch(err => console.error("Error loading JSON:", err));
            }, []);

            const filteredAndSorted = useMemo(() => {
                let result = metrics;
                if (filterModel !== 'ALL') result = result.filter(d => d.model === filterModel);
                if (filterRes !== 'ALL') result = result.filter(d => d.res === filterRes);
                if (filterDenom !== 'ALL') result = result.filter(d => d.denom === filterDenom);

                return result.sort((a, b) => b[sortBy] - a[sortBy]);
            }, [metrics, filterModel, filterRes, filterDenom, sortBy]);

            const uniqueModels = [...new Set(metrics.map(d => d.model))];
            const uniqueRes = [...new Set(metrics.map(d => d.res))];

            if (metrics.length === 0) return <div className="h-screen flex items-center justify-center font-mono crt-flicker">AWAITING EVALUATION METRICS JSON <span className="blinking-cursor"></span></div>;

            return (
                <div className="h-screen flex font-mono bg-[#1e2418] text-[#a4b596] crt-flicker relative z-10">
                    <div className="w-12 border-r border-[#a4b596]/30 flex flex-col items-center py-4 bg-[#141810] shrink-0">
                        <div className="text-[10px] transform -rotate-90 tracking-widest mt-16 opacity-50 whitespace-nowrap">ML.EVAL. 0x9B2C</div>
                    </div>

                    <div className="flex-1 flex flex-col p-4 overflow-y-auto overflow-x-hidden gap-4">
                        <header className="flex justify-between items-end border-b border-[#a4b596]/50 pb-3 shrink-0">
                            <div>
                                <h1 className="text-2xl font-bold tracking-widest text-[#d1e0c5]">SOP MODEL EVALUATION TERMINAL</h1>
                                <p className="text-xs opacity-70 mt-1 tracking-widest">PERFORMANCE BENCHMARKING GRID</p>
                            </div>
                            <div className="flex flex-col items-end gap-2 text-xs">
                                <div className="flex items-center gap-3 mt-1">
                                    <div className="flex border border-[#a4b596]/30 bg-[#141810]">
                                        <button onClick={() => setFilterDenom('ALL')} className={`px-2 py-1 text-[10px] font-bold ${filterDenom === 'ALL' ? 'bg-[#a4b596] text-[#1e2418]' : 'text-[#a4b596] hover:bg-[#3a4531]'}`}>ALL DENOM</button>
                                        <button onClick={() => setFilterDenom('usd')} className={`px-2 py-1 text-[10px] font-bold ${filterDenom === 'usd' ? 'bg-[#a4b596] text-[#1e2418]' : 'text-[#a4b596] hover:bg-[#3a4531]'}`}>USD</button>
                                        <button onClick={() => setFilterDenom('native')} className={`px-2 py-1 text-[10px] font-bold ${filterDenom === 'native' ? 'bg-[#a4b596] text-[#1e2418]' : 'text-[#a4b596] hover:bg-[#3a4531]'}`}>NATIVE</button>
                                    </div>

                                    <div className="flex border border-[#a4b596]/30 bg-[#141810]">
                                        <button onClick={() => setFilterModel('ALL')} className={`px-2 py-1 text-[10px] font-bold ${filterModel === 'ALL' ? 'bg-[#b8a86c] text-[#1e2418]' : 'text-[#b8a86c] hover:bg-[#3a4531]'}`}>ALL MODELS</button>
                                        {uniqueModels.map(m => (
                                            <button key={m} onClick={() => setFilterModel(m)} className={`px-2 py-1 text-[10px] uppercase font-bold ${filterModel === m ? 'bg-[#b8a86c] text-[#1e2418]' : 'text-[#b8a86c] hover:bg-[#3a4531]'}`}>{m}</button>
                                        ))}
                                    </div>

                                    <div className="flex border border-[#a4b596]/30 bg-[#141810]">
                                        <button onClick={() => setFilterRes('ALL')} className={`px-2 py-1 text-[10px] font-bold ${filterRes === 'ALL' ? 'bg-[#7ba6d1] text-[#1e2418]' : 'text-[#7ba6d1] hover:bg-[#3a4531]'}`}>ALL RES</button>
                                        {uniqueRes.map(r => (
                                            <button key={r} onClick={() => setFilterRes(r)} className={`px-2 py-1 text-[10px] uppercase font-bold ${filterRes === r ? 'bg-[#7ba6d1] text-[#1e2418]' : 'text-[#7ba6d1] hover:bg-[#3a4531]'}`}>{r}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </header>

                        <div className="flex justify-between items-end border-b border-[#a4b596]/20 pb-2 mb-2">
                            <div className="flex gap-2 text-[10px] uppercase font-bold tracking-widest items-center">
                                <span className="opacity-50">SORT BY: </span>
                                <ToggleButton label="F1 SCORE" active={sortBy === 'f1'} color="#a4b596" onClick={() => setSortBy('f1')} />
                                <ToggleButton label="ACCURACY" active={sortBy === 'accuracy'} color="#a4b596" onClick={() => setSortBy('accuracy')} />
                                <ToggleButton label="PRECISION" active={sortBy === 'precision'} color="#a4b596" onClick={() => setSortBy('precision')} />
                            </div>

                            <div className="flex gap-2 text-[10px] uppercase font-bold tracking-widest items-center">
                                <span className="opacity-50">VIEW: </span>
                                <ToggleButton label="METRICS" active={viewMode === 'BARS'} color="#a4b596" onClick={() => setViewMode('BARS')} />
                                <ToggleButton label="CM MATRIX" active={viewMode === 'CM'} color="#7ba6d1" onClick={() => setViewMode('CM')} />
                                <ToggleButton label="AUROC" active={viewMode === 'ROC'} color="#8c74a3" onClick={() => setViewMode('ROC')} />
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-12">
                            {filteredAndSorted.map(exp => (
                                <div key={exp.id} className="border border-[#a4b596]/30 bg-[#141810] p-4 glow-box flex flex-col relative min-h-[220px]">
                                    <div className="flex justify-between items-start border-b border-[#a4b596]/20 pb-2 mb-3">
                                        <div>
                                            <h3 className="text-[#d1e0c5] font-bold uppercase tracking-widest">{exp.model}</h3>
                                            <p className="text-[9px] opacity-70 uppercase tracking-widest mt-1">
                                                RES: <span className="text-[#7ba6d1] font-bold">{exp.res}</span> | 
                                                DENOM: <span className="text-[#b8a86c] font-bold">{exp.denom}</span>
                                            </p>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[9px] uppercase border border-[#a4b596]/40 px-1 py-0.5 text-[#a4b596]">
                                                {exp.mode}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="flex-1 flex flex-col">
                                        {viewMode === 'BARS' && (
                                            <div className="space-y-1 mt-1">
                                                <MetricBar label="ACCURACY" value={exp.accuracy} color={exp.accuracy >= 52 ? REF_GREEN : (exp.accuracy < 50 ? REF_RED : '#a4b596')} />
                                                <MetricBar label="F1 SCORE" value={exp.f1} color={REF_GOLD} />
                                                <MetricBar label="PRECISION" value={exp.precision} color={REF_BLUE} />
                                                <MetricBar label="RECALL" value={exp.recall} color={REF_PURPLE} />
                                            </div>
                                        )}

                                        {viewMode === 'CM' && (
                                            <ConfusionMatrix cm={exp.confusion_matrix} />
                                        )}

                                        {viewMode === 'ROC' && (
                                            <div className="flex-1 flex flex-col relative min-h-[120px]">
                                                <div className="absolute top-0 right-0 z-10 text-right">
                                                    <p className="text-[8px] uppercase text-[#8c74a3] opacity-70">AUROC SCORE</p>
                                                    <p className="text-sm font-bold text-white font-mono">{exp.auroc?.toFixed(4) || 'N/A'}</p>
                                                </div>
                                                
                                                {exp.roc_curve && exp.roc_curve.length > 0 ? (
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <LineChart data={exp.roc_curve} margin={{ top: 15, right: 0, left: -25, bottom: 0 }}>
                                                            <CartesianGrid strokeDasharray="2 4" stroke="#a4b596" opacity={0.1} />
                                                            <XAxis dataKey="fpr" type="number" domain={[0, 1]} tick={{fontSize: 8, fill: '#a4b596'}} tickCount={3} axisLine={false} tickLine={false} />
                                                            <YAxis dataKey="tpr" type="number" domain={[0, 1]} tick={{fontSize: 8, fill: '#a4b596'}} tickCount={3} axisLine={false} tickLine={false} />
                                                            <RechartsTooltip 
                                                                contentStyle={{ backgroundColor: '#141810', borderColor: '#8c74a3', fontSize: '10px' }} 
                                                                itemStyle={{ color: '#8c74a3' }}
                                                                labelStyle={{ display: 'none' }}
                                                                formatter={(val, name) => [val.toFixed(3), name.toUpperCase()]}
                                                            />
                                                            <Line dataKey="fpr" stroke="#a4b596" strokeDasharray="3 3" opacity={0.3} dot={false} isAnimationActive={false} />
                                                            <Line type="stepAfter" dataKey="tpr" stroke="#8c74a3" strokeWidth={2} dot={false} isAnimationActive={false} />
                                                        </LineChart>
                                                    </ResponsiveContainer>
                                                ) : (
                                                    <div className="flex-1 flex items-center justify-center text-[10px] opacity-50">NO ROC DATA</div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    <div className="mt-4 pt-2 border-t border-[#a4b596]/20 text-[9px] opacity-50 flex justify-between">
                                        <span>SAMPLES: {exp.samples}</span>
                                        <span>STATUS: <span className={exp.accuracy >= 52 ? "text-[#82ba97]" : "text-[#d17373]"}>{exp.accuracy >= 52 ? 'VIABLE' : 'DEGRADED'}</span></span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
