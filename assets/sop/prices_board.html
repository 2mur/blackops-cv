<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP ORACLE: ASSET PRICING ENGINE</title>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "recharts": "https://esm.sh/recharts@2.12.2?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #1e2418; color: #a4b596; margin: 0; overflow-x: hidden; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .scanlines { background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15)); background-size: 100% 4px; pointer-events: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; }
        .crt-flicker { animation: flicker 0.15s infinite; }
        @keyframes flicker { 0% { opacity: 0.95; } 50% { opacity: 1; } 100% { opacity: 0.98; } }
        .glow-box { box-shadow: inset 0 0 20px rgba(164, 181, 150, 0.03); background: rgba(20, 24, 16, 0.4); backdrop-filter: blur(4px); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(58, 69, 49, 0.2); border-left: 1px solid rgba(164, 181, 150, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(164, 181, 150, 0.4); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(164, 181, 150, 0.6); }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Brush 
        } from 'recharts';

        const DUNE_ID = '4834833';

        const PriceTooltip = ({ active, payload, label, unit, decimals = 2, color = '#60a5fa' }) => {
            if (active && payload && payload.length) {
                const val = payload[0].value;
                return (
                    <div className="bg-[#141810]/95 border border-[#a4b596]/50 p-2 text-[10px] shadow-2xl z-50 min-w-[150px] backdrop-blur-md">
                        <p className="text-white border-b border-[#a4b596]/30 pb-1 mb-1 font-bold">{label}</p>
                        <div className="flex justify-between items-center">
                            <span className="opacity-70">PRICE:</span>
                            <span className="font-mono font-bold" style={{ color }}>
                                {unit}{val.toFixed(decimals)}
                            </span>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [timeFilter, setTimeFilter] = useState('ALL');

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await fetch(`data/prices/prices.json`);
                        if (!res.ok) throw new Error("Price feed not found. Did the Python script run successfully?");
                        const rawData = await res.json();
                        
                        // Parse dates to extract year for filtering
                        const parsedData = rawData.map(d => ({
                            ...d,
                            year: d.time.substring(0, 4)
                        }));
                        
                        setData(parsedData);
                        setLoading(false);
                    } catch (err) {
                        setError(err.message);
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            const { filteredData, kpis, availableYears } = useMemo(() => {
                if (!data.length) return { filteredData: [], kpis: null, availableYears: [] };

                const years = [...new Set(data.map(d => d.year))].sort();
                
                let filtered = data;
                if (timeFilter !== 'ALL') {
                    filtered = data.filter(d => d.year === timeFilter);
                }

                if (!filtered.length) return { filteredData: [], kpis: null, availableYears: years };

                // Calculate KPIs (Current vs 24h ago)
                const current = filtered[filtered.length - 1];
                // Assuming hourly data, 24 hours ago is roughly 24 indices back
                const past24hIndex = Math.max(0, filtered.length - 25);
                const past = filtered[past24hIndex];

                const calcChange = (curr, prev) => prev > 0 ? ((curr - prev) / prev) * 100 : 0;

                const kpis = {
                    nochillUsd: { val: current.token_price_usd, change: calcChange(current.token_price_usd, past.token_price_usd) },
                    wavaxUsd: { val: current.native_price, change: calcChange(current.native_price, past.native_price) },
                    nochillAvax: { val: current.token_price_native, change: calcChange(current.token_price_native, past.token_price_native) },
                };

                return { filteredData: filtered, kpis, availableYears: years };
            }, [data, timeFilter]);

            if (loading) return <div className="h-screen flex items-center justify-center text-xl tracking-widest animate-pulse text-[#60a5fa]">SYNCHRONIZING PRICING FEEDS...</div>;
            if (error) return <div className="h-screen flex flex-col items-center justify-center text-red-500 max-w-2xl mx-auto text-center"><p className="text-2xl font-bold mb-4">FEED DISCONNECTED</p><p className="text-sm">{error}</p></div>;

            return (
                <div className="h-screen flex flex-col p-4 bg-[#1e2418] text-[#a4b596] crt-flicker relative z-10 gap-3 overflow-hidden">
                    
                    <header className="flex flex-wrap justify-between items-end border-b border-[#a4b596]/50 pb-2 shrink-0 gap-4">
                        <div>
                            <h1 className="text-xl font-bold tracking-widest text-[#d1e0c5] drop-shadow-md">ASSET PRICING ENGINE</h1>
                            <p className="text-[10px] tracking-widest opacity-70 mt-1">NOCHILL / WAVAX / USD FEED</p>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-2 text-xs">
                            <span className="text-[9px] opacity-70 tracking-widest mr-2">TIME HORIZON:</span>
                            <button 
                                onClick={() => setTimeFilter('ALL')} 
                                className={`text-[10px] tracking-widest px-3 py-1 border transition-colors ${timeFilter === 'ALL' ? 'bg-[#a4b596] text-[#1e2418] border-[#a4b596]' : 'border-[#a4b596]/30 text-[#a4b596] hover:bg-[#a4b596]/10'}`}
                            >
                                ALL TIME
                            </button>
                            {availableYears.map(year => (
                                <button 
                                    key={year}
                                    onClick={() => setTimeFilter(year)} 
                                    className={`text-[10px] tracking-widest px-3 py-1 border transition-colors ${timeFilter === year ? 'bg-[#a4b596] text-[#1e2418] border-[#a4b596]' : 'border-[#a4b596]/30 text-[#a4b596] hover:bg-[#a4b596]/10'}`}
                                >
                                    {year}
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* KPI ROW */}
                    {kpis && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 shrink-0 mt-2">
                            {/* NOCHILL USD */}
                            <div className="border border-[#60a5fa]/40 bg-[#141810] p-4 flex flex-col justify-center glow-box">
                                <p className="text-[10px] text-[#60a5fa] tracking-widest font-bold">NOCHILL / USD</p>
                                <div className="flex justify-between items-end mt-2">
                                    <p className="text-2xl text-white font-mono font-bold">${kpis.nochillUsd.val.toFixed(8)}</p>
                                    <div className={`text-[11px] font-mono font-bold pb-1 ${kpis.nochillUsd.change >= 0 ? 'text-[#10b981]' : 'text-[#ef4444]'}`}>
                                        {kpis.nochillUsd.change > 0 ? '▲ +' : '▼ '}{kpis.nochillUsd.change.toFixed(2)}% (24H)
                                    </div>
                                </div>
                            </div>

                            {/* WAVAX USD */}
                            <div className="border border-[#ef4444]/40 bg-[#141810] p-4 flex flex-col justify-center glow-box">
                                <p className="text-[10px] text-[#ef4444] tracking-widest font-bold">WAVAX / USD</p>
                                <div className="flex justify-between items-end mt-2">
                                    <p className="text-2xl text-white font-mono font-bold">${kpis.wavaxUsd.val.toFixed(2)}</p>
                                    <div className={`text-[11px] font-mono font-bold pb-1 ${kpis.wavaxUsd.change >= 0 ? 'text-[#10b981]' : 'text-[#ef4444]'}`}>
                                        {kpis.wavaxUsd.change > 0 ? '▲ +' : '▼ '}{kpis.wavaxUsd.change.toFixed(2)}% (24H)
                                    </div>
                                </div>
                            </div>

                            {/* NOCHILL AVAX */}
                            <div className="border border-[#f59e0b]/40 bg-[#141810] p-4 flex flex-col justify-center glow-box">
                                <p className="text-[10px] text-[#f59e0b] tracking-widest font-bold">NOCHILL / WAVAX</p>
                                <div className="flex justify-between items-end mt-2">
                                    <p className="text-2xl text-white font-mono font-bold">A {kpis.nochillAvax.val.toFixed(8)}</p>
                                    <div className={`text-[11px] font-mono font-bold pb-1 ${kpis.nochillAvax.change >= 0 ? 'text-[#10b981]' : 'text-[#ef4444]'}`}>
                                        {kpis.nochillAvax.change > 0 ? '▲ +' : '▼ '}{kpis.nochillAvax.change.toFixed(2)}% (24H)
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CHARTS CONTAINER */}
                    <div className="flex-1 flex flex-col gap-3 min-h-0 mt-2 overflow-y-auto pr-1">
                        
                        {/* CHART 1: NOCHILL / USD */}
                        <div className="h-[250px] border border-[#60a5fa]/30 bg-[#141810] p-2 glow-box relative shrink-0">
                            <div className="absolute top-2 left-3 z-10 text-[9px] tracking-widest text-[#60a5fa] font-bold">NOCHILL / USD</div>
                            <div className="w-full h-full pt-6">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={filteredData} syncId="priceSync" margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                                        <defs>
                                            <linearGradient id="colorNochill" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#60a5fa" stopOpacity={0.3}/>
                                                <stop offset="95%" stopColor="#60a5fa" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="2 4" stroke="#a4b596" opacity={0.1} vertical={false} />
                                        <XAxis dataKey="time" hide />
                                        <YAxis domain={['auto', 'auto']} tickFormatter={(v) => '$'+v.toFixed(6)} tick={{ fontSize: 9, fill: '#60a5fa' }} axisLine={false} tickLine={false} width={65} />
                                        <Tooltip content={<PriceTooltip unit="$" decimals={8} color="#60a5fa" />} cursor={{ stroke: '#a4b596', strokeDasharray: '3 3', opacity: 0.3 }} />
                                        <Area type="monotone" dataKey="token_price_usd" stroke="#60a5fa" fillOpacity={1} fill="url(#colorNochill)" strokeWidth={1.5} isAnimationActive={false} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* CHART 2: WAVAX / USD */}
                        <div className="h-[200px] border border-[#ef4444]/30 bg-[#141810] p-2 glow-box relative shrink-0">
                            <div className="absolute top-2 left-3 z-10 text-[9px] tracking-widest text-[#ef4444] font-bold">WAVAX / USD</div>
                            <div className="w-full h-full pt-6">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={filteredData} syncId="priceSync" margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                                        <defs>
                                            <linearGradient id="colorWavax" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#ef4444" stopOpacity={0.3}/>
                                                <stop offset="95%" stopColor="#ef4444" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="2 4" stroke="#a4b596" opacity={0.1} vertical={false} />
                                        <XAxis dataKey="time" hide />
                                        <YAxis domain={['auto', 'auto']} tickFormatter={(v) => '$'+v.toFixed(2)} tick={{ fontSize: 9, fill: '#ef4444' }} axisLine={false} tickLine={false} width={65} />
                                        <Tooltip content={<PriceTooltip unit="$" decimals={2} color="#ef4444" />} cursor={{ stroke: '#a4b596', strokeDasharray: '3 3', opacity: 0.3 }} />
                                        <Area type="monotone" dataKey="native_price" stroke="#ef4444" fillOpacity={1} fill="url(#colorWavax)" strokeWidth={1.5} isAnimationActive={false} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* CHART 3: NOCHILL / WAVAX (With Brush) */}
                        <div className="h-[220px] border border-[#f59e0b]/30 bg-[#141810] p-2 glow-box relative shrink-0">
                            <div className="absolute top-2 left-3 z-10 text-[9px] tracking-widest text-[#f59e0b] font-bold">NOCHILL / WAVAX NATIVE RATIO</div>
                            <div className="w-full h-full pt-6 pb-2">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={filteredData} syncId="priceSync" margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                                        <defs>
                                            <linearGradient id="colorRatio" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#f59e0b" stopOpacity={0.3}/>
                                                <stop offset="95%" stopColor="#f59e0b" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="2 4" stroke="#a4b596" opacity={0.1} vertical={false} />
                                        <XAxis dataKey="time" hide />
                                        <YAxis domain={['auto', 'auto']} tickFormatter={(v) => v.toFixed(6)} tick={{ fontSize: 9, fill: '#f59e0b' }} axisLine={false} tickLine={false} width={65} />
                                        <Tooltip content={<PriceTooltip unit="A " decimals={8} color="#f59e0b" />} cursor={{ stroke: '#a4b596', strokeDasharray: '3 3', opacity: 0.3 }} />
                                        <Area type="monotone" dataKey="token_price_native" stroke="#f59e0b" fillOpacity={1} fill="url(#colorRatio)" strokeWidth={1.5} isAnimationActive={false} />
                                        <Brush dataKey="time" height={15} stroke="#a4b596" fill="#141810" travellerWidth={10} tickFormatter={() => ''} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
